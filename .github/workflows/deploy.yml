name: CI-CD Snake Game

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Docker Hub Login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build Image (disable BuildKit issue)
      - name: Build Docker Image
        run: DOCKER_BUILDKIT=0 docker build -t ${{ secrets.DOCKER_USERNAME }}/snake-game:latest .

      # 🚀 Push Image
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/snake-game:latest

      # 🛑 Stop old container
      - name: Stop old container
        run: |
          docker stop snake-game || true
          docker rm snake-game || true

      # ▶️ Run new container
      - name: Run container
        run: docker run -d -p 80:80 --name snake-game ${{ secrets.DOCKER_USERNAME }}/snake-game:latest

      # ✅ Health check
      - name: Health Check
        run: curl -f http://localhost || exit 1

      # 📧 Email notification
      - name: Send Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Deployment Successful"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: GitHub Actions
          body: "Snake Game deployed successfully 🚀"